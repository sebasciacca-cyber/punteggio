<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=1280, initial-scale=1"><meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0"><meta http-equiv="Pragma" content="no-cache"><meta http-equiv="Expires" content="0"><style>html,body{margin:0;width:1280px;height:190px;overflow:hidden;background:transparent;font-family:Arial,Helvetica,sans-serif;color:white;}.bar{box-sizing:border-box;width:1280px;height:190px;display:grid;grid-template-columns:1fr 270px 1fr;align-items:center;padding:18px 32px;background:linear-gradient(90deg,rgba(6,48,32,.92),rgba(24,112,70,.88),rgba(6,48,32,.92));border:6px solid rgba(231,190,92,.9);}.player{font-size:42px;font-weight:800;text-transform:uppercase;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}.right{text-align:right;}.center{text-align:center;}.discipline{font-size:22px;font-weight:700;color:#f5d27b;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}.score{font-size:76px;line-height:84px;font-weight:900;letter-spacing:0;color:#fff;}.sets{font-size:22px;color:#dbeafe;}.turn{font-size:18px;color:#e5e7eb;margin-top:4px;}</style><script>var WORKER_URL='punteggio.sebasciacca.workers.dev/punteggio';var STATE_URLS=['https://api.github.com/repos/sebasciacca-cyber/punteggio/contents/streaming-state.json','https://api.github.com/repos/sebasciacca-cyber/punteggio/contents/public/streaming-state.json','https://api.github.com/repos/sebasciacca-cyber/punteggio/contents/docs/streaming-state.json'];function setText(id,value){document.getElementById(id).textContent=value||'';}function applyState(s){var p1=s.giocatore1||s.player1;var p2=s.giocatore2||s.player2;var score=(s.punti1!==undefined&&s.punti2!==undefined)?(s.punti1+' - '+s.punti2):s.score;setText('p1',p1);setText('p2',p2);setText('discipline',s.disciplina||s.discipline);setText('score',score);setText('detail',s.dettaglio||s.detail);setText('turn','Turno: '+(s.turno||s.turn||''));}function decodeBase64(value){var binary=atob((value||'').replace(/\n/g,''));if(window.TextDecoder){var bytes=new Uint8Array(binary.length);for(var i=0;i<binary.length;i++){bytes[i]=binary.charCodeAt(i);}return new TextDecoder('utf-8').decode(bytes);}return decodeURIComponent(escape(binary));}function fetchState(i){if(i>=STATE_URLS.length){return;}fetch(STATE_URLS[i]+'?v='+Date.now(),{cache:'no-store',headers:{'Accept':'application/vnd.github+json'}}).then(function(r){if(!r.ok){throw new Error('HTTP '+r.status);}return r.json();}).then(function(file){applyState(JSON.parse(decodeBase64(file.content)));}).catch(function(){fetchState(i+1);});}function loadState(){if(WORKER_URL){fetch(WORKER_URL+'?v='+Date.now(),{cache:'no-store'}).then(function(r){if(!r.ok){throw new Error('HTTP '+r.status);}return r.json();}).then(applyState).catch(function(){});}else{fetchState(0);}}window.addEventListener('load',function(){loadState();setInterval(loadState,2000);});</script></head><body><div class="bar"><div id="p1" class="player">Giocatore 1</div><div class="center"><div id="discipline" class="discipline">Italiana 5 birilli</div><div id="score" class="score">0 - 0</div><div id="detail" class="sets">Set 0 - 0</div><div id="turn" class="turn">Turno: Giocatore 1</div></div><div id="p2" class="player right">Giocatore 2</div></div></body></html>
